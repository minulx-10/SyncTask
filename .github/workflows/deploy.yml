name: Deploy SyncTask Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /home/ubuntu/SyncTask
            OLD_HEAD=$(git rev-parse HEAD)
            git pull origin main
            NEW_HEAD=$(git rev-parse HEAD)
            
            if git diff --name-only $OLD_HEAD $NEW_HEAD | grep -qE '\.py$|requirements\.txt'; then
                echo "Python code or dependencies changed. Restarting service..."
                source venv/bin/activate
                pip install -r requirements.txt
                sudo systemctl restart synctask.service
            else
                echo "Only static files or docs changed. Skipping service restart."
            fi

      - name: Deployment Summary
        run: |
          echo "### 🚀 SyncTask Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**🌐 Admin Dashboard:** http://${{ secrets.SERVER_IP }}:10000" >> $GITHUB_STEP_SUMMARY
          echo "**🔑 Password:** Check your .env file on the server" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ *SSH-based high-speed tunneling technology is now active!*" >> $GITHUB_STEP_SUMMARY
