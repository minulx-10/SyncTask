<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncTask · Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
    <main class="login-shell">
        <section class="login-card">
            <div class="brand">
                <div class="brand-dot"></div>
                <div class="brand-name">SyncTask</div>
            </div>
            <h1 class="login-title">교사용 공지 웹</h1>
            <p class="login-subtitle">Discord 계정으로 로그인하면 등록된 선생님에게 허용된 서버만 표시됩니다.</p>

            <div class="login-actions">
                <a class="btn" id="discord-login" href="{{OAUTH_URL}}">Discord로 로그인</a>
                <p class="login-note" id="oauth-status">{{OAUTH_STATUS}}</p>
            </div>

            <div class="divider"></div>

            <form action="/do_login" method="post" id="password-form">
                <div class="field">
                    <label for="password">비상 관리자 비밀번호</label>
                    <input id="password" type="password" name="password" placeholder="관리자 비밀번호">
                </div>
                <button class="btn secondary" type="submit">관리자로 로그인</button>
            </form>
            <p class="login-note">공유 링크: {{PUBLIC_URL}}</p>
        </section>
    </main>

    <script>
        const oauthUrl = "{{OAUTH_URL}}";
        const passwordEnabled = "{{PASSWORD_ENABLED}}" === "1";
        if (!oauthUrl) {
            const login = document.getElementById('discord-login');
            login.classList.add('secondary');
            login.removeAttribute('href');
            login.textContent = 'Discord OAuth 설정 필요';
        }
        if (!passwordEnabled) {
            document.getElementById('password-form').style.display = 'none';
        }
    </script>
</body>
</html>
