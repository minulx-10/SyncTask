<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncTask · Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="brand">
                <div class="brand-dot"></div>
                <div class="brand-name">SyncTask</div>
            </div>
            <nav class="nav">
                <a class="nav-link" href="/">대시보드</a>
                <a class="nav-link active" href="/admin/logs">운영 로그</a>
                <a class="nav-link" href="/announcements">교사용 공지</a>
                <a class="nav-link" href="/logout">로그아웃</a>
            </nav>
        </header>

        <section id="grid-view">
            <div class="grid" id="server-list"></div>
        </section>

        <section id="log-view">
            <div class="log-header">
                <button class="small-btn" onclick="showGrid()">목록</button>
                <div class="panel-title" id="log-title"></div>
            </div>
            <div class="filters">
                <input type="text" id="f-user" placeholder="유저 검색" oninput="renderLogs()">
                <input type="text" id="f-cmd" placeholder="명령어 검색" oninput="renderLogs()">
                <input type="text" id="f-detail" placeholder="내용 검색" oninput="renderLogs()">
            </div>
            <div class="logs" id="log-list"></div>
        </section>
    </div>

    <div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
        <div class="modal">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-title">로그 상세</div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="/static/dashboard.js"></script>
</body>
</html>
